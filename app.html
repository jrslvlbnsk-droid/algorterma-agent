<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0a">
  <title>Web Agent</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --accent: #00ff88;
      --accent-dim: #00ff8822;
      --text: #e8e8e8;
      --text-dim: #555;
      --user: #1a2a1a;
      --danger: #ff4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; overflow: hidden; }

    /* ── SETUP / LOGIN ── */
    #setup-screen {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; z-index: 100; padding: 40px;
    }

    .setup-logo { font-size: 13px; font-family: 'JetBrains Mono', monospace; color: var(--accent); letter-spacing: 4px; margin-bottom: 8px; }
    .setup-title { font-size: 26px; font-weight: 700; text-align: center; }
    .setup-sub { font-size: 12px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; text-align: center; }

    .setup-label { font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; align-self: flex-start; max-width: 320px; width: 100%; }

    .setup-input {
      width: 100%; max-width: 320px; padding: 14px 16px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      color: var(--text); font-size: 14px; font-family: 'JetBrains Mono', monospace;
      outline: none; transition: border-color 0.2s;
    }
    .setup-input:focus { border-color: var(--accent); }

    .setup-btn {
      width: 100%; max-width: 320px; padding: 15px;
      background: var(--accent); color: #000; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700; font-family: 'Syne', sans-serif;
      cursor: pointer; margin-top: 8px;
    }
    .setup-btn:active { opacity: 0.8; }
    .setup-error { color: var(--danger); font-size: 12px; font-family: 'JetBrains Mono', monospace; }

    /* ── APP ── */
    #app { display: none; flex-direction: column; height: 100%; }

    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--bg); flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .header-title { font-size: 16px; font-weight: 700; }
    .header-sub { font-size: 11px; color: var(--accent); font-family: 'JetBrains Mono', monospace; }

    .settings-btn { background: none; border: 1px solid var(--border); color: var(--text-dim); padding: 8px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; font-family: 'JetBrains Mono', monospace; }

    .project-bar { display: flex; gap: 8px; padding: 12px 20px; border-bottom: 1px solid var(--border); overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
    .project-bar::-webkit-scrollbar { display: none; }
    .proj-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-size: 13px; font-family: 'JetBrains Mono', monospace; cursor: pointer; white-space: nowrap; transition: all 0.15s; flex-shrink: 0; }
    .proj-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    #messages { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

    .msg { display: flex; flex-direction: column; gap: 4px; max-width: 88%; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot { align-self: flex-start; align-items: flex-start; }

    .msg-bubble { padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.5; word-break: break-word; }
    .msg.user .msg-bubble { background: var(--user); border: 1px solid #2a4a2a; border-bottom-right-radius: 4px; }
    .msg.bot .msg-bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
    .msg.bot .msg-bubble.success { border-color: var(--accent); color: var(--accent); }
    .msg.bot .msg-bubble.error { border-color: var(--danger); color: var(--danger); }
    .msg-time { font-size: 10px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; padding: 0 4px; }

    .thinking { display: flex; gap: 5px; padding: 14px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; border-bottom-left-radius: 4px; width: fit-content; }
    .thinking span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: bounce 1.2s infinite; }
    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-6px); opacity: 1; } }

    .input-area { padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom)); border-top: 1px solid var(--border); background: var(--bg); flex-shrink: 0; }
    .quick-cmds { display: flex; gap: 6px; margin-bottom: 10px; overflow-x: auto; scrollbar-width: none; }
    .quick-cmds::-webkit-scrollbar { display: none; }
    .cmd-chip { padding: 6px 12px; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-size: 11px; font-family: 'JetBrains Mono', monospace; cursor: pointer; white-space: nowrap; transition: all 0.15s; flex-shrink: 0; }
    .cmd-chip:active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    #input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 12px 16px; color: var(--text); font-size: 15px; font-family: 'Syne', sans-serif; outline: none; resize: none; max-height: 120px; min-height: 48px; line-height: 1.4; transition: border-color 0.2s; }
    #input:focus { border-color: var(--accent); }
    #input::placeholder { color: var(--text-dim); }
    #send-btn { width: 48px; height: 48px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.2s, transform 0.1s; }
    #send-btn:active { opacity: 0.8; transform: scale(0.95); }
    #send-btn svg { width: 20px; height: 20px; }
  </style>
</head>
<body>

<!-- SETUP -->
<div id="setup-screen">
  <div class="setup-logo">⬡ Web Agent</div>
  <div class="setup-title" id="setup-title">Nastavení</div>
  <div class="setup-sub" id="setup-sub">první spuštění — zadej klíče</div>

  <div id="setup-fields">
    <div class="setup-label">GROQ API KEY</div>
    <input class="setup-input" id="s-groq" type="password" placeholder="gsk_...">
    <div class="setup-label" style="margin-top:12px">GITHUB TOKEN</div>
    <input class="setup-input" id="s-github" type="password" placeholder="ghp_...">
    <div class="setup-label" style="margin-top:12px">HESLO PRO APPKU</div>
    <input class="setup-input" id="s-pass" type="password" placeholder="zvolte heslo">
    <button class="setup-btn" onclick="saveSetup()">Uložit a pokračovat</button>
    <div class="setup-error" id="setup-error"></div>
  </div>

  <div id="login-fields" style="display:none; width:100%; max-width:320px; display:none; flex-direction:column; align-items:center; gap:16px;">
    <div class="setup-label">HESLO</div>
    <input class="setup-input" id="l-pass" type="password" placeholder="••••••••" style="text-align:center; letter-spacing:4px">
    <button class="setup-btn" onclick="checkLogin()">Vstoupit</button>
    <div class="setup-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div class="header-left">
      <div class="status-dot"></div>
      <div>
        <div class="header-title">Web Agent</div>
        <div class="header-sub" id="current-project-label">algorterma.cz</div>
      </div>
    </div>
    <button class="settings-btn" onclick="resetSetup()">⚙ reset</button>
  </div>

  <div class="project-bar">
    <button class="proj-btn active" onclick="switchProject('algorterma', this)">AlgorTerma</button>
    <button class="proj-btn" onclick="switchProject('neumimplavat', this)">Neumimplavat</button>
  </div>

  <div id="messages"></div>

  <div class="input-area">
    <div class="quick-cmds">
      <button class="cmd-chip" onclick="sendQuick('/history')">📜 Historie</button>
      <button class="cmd-chip" onclick="sendQuick('/soubory')">📂 Soubory</button>
      <button class="cmd-chip" onclick="sendQuick('/projekt')">📁 Projekt</button>
      <button class="cmd-chip" onclick="sendQuick('/help')">❓ Help</button>
    </div>
    <div class="input-row">
      <textarea id="input" placeholder="Co chceš upravit..." rows="1"></textarea>
      <button id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
const GITHUB_USER = 'jrslvlbnsk-droid';
const projects = {
  algorterma: { repo: 'algorterma-web', file: 'index.html', name: 'AlgorTerma', url: 'algorterma.cz' },
  neumimplavat: { repo: 'neumimplavat', file: 'index.html', name: 'Neumimplavat', url: 'neumimplavat.cz' }
};

let GROQ_API_KEY = '';
let GITHUB_TOKEN = '';
let currentProject = 'algorterma';
let history = [];
let thinking = null;

// ── SETUP & AUTH ──
function init() {
  const saved = localStorage.getItem('wa_config');
  if (!saved) {
    showSetup();
  } else {
    showLogin();
  }
}

function showSetup() {
  document.getElementById('setup-title').textContent = 'Nastavení';
  document.getElementById('setup-sub').textContent = 'první spuštění — zadej klíče';
  document.getElementById('setup-fields').style.display = 'flex';
  document.getElementById('setup-fields').style.flexDirection = 'column';
  document.getElementById('setup-fields').style.alignItems = 'center';
  document.getElementById('setup-fields').style.gap = '12px';
  document.getElementById('setup-fields').style.width = '100%';
  document.getElementById('login-fields').style.display = 'none';
}

function showLogin() {
  document.getElementById('setup-title').textContent = 'Přihlášení';
  document.getElementById('setup-sub').textContent = 'zadej heslo pro přístup';
  document.getElementById('setup-fields').style.display = 'none';
  document.getElementById('login-fields').style.display = 'flex';
  document.getElementById('login-fields').style.flexDirection = 'column';
  document.getElementById('login-fields').style.alignItems = 'center';
}

function saveSetup() {
  const groq = document.getElementById('s-groq').value.trim();
  const github = document.getElementById('s-github').value.trim();
  const pass = document.getElementById('s-pass').value.trim();
  if (!groq || !github || !pass) {
    document.getElementById('setup-error').textContent = 'Vyplň všechna pole.';
    return;
  }
  localStorage.setItem('wa_config', JSON.stringify({ groq, github, pass }));
  loadConfig();
  launchApp();
}

function checkLogin() {
  const config = JSON.parse(localStorage.getItem('wa_config'));
  const pass = document.getElementById('l-pass').value;
  if (pass === config.pass) {
    loadConfig();
    launchApp();
  } else {
    document.getElementById('login-error').textContent = 'Špatné heslo.';
    document.getElementById('l-pass').value = '';
  }
}

function loadConfig() {
  const config = JSON.parse(localStorage.getItem('wa_config'));
  GROQ_API_KEY = config.groq;
  GITHUB_TOKEN = config.github;
}

function launchApp() {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  addMsg('bot', '👋 Ahoj! Jsem tvůj web agent.\nNapiš co chceš upravit, nebo použij tlačítka níže.');
}

function resetSetup() {
  if (confirm('Smazat nastavení a odhlásit se?')) {
    localStorage.removeItem('wa_config');
    location.reload();
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-fields').style.display !== 'none') checkLogin();
  if (e.key === 'Enter' && document.getElementById('setup-fields').style.display !== 'none') saveSetup();
});

// ── PROJECT ──
function switchProject(key, btn) {
  currentProject = key;
  history = [];
  document.querySelectorAll('.proj-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('current-project-label').textContent = projects[key].url;
  addMsg('bot', `✅ Přepnuto na ${projects[key].name}`);
}

// ── MESSAGES ──
function addMsg(type, text, style = '') {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  const time = new Date().toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' });
  div.innerHTML = `<div class="msg-bubble ${style}">${text.replace(/\n/g, '<br>')}</div><div class="msg-time">${time}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showThinking() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `<div class="thinking"><span></span><span></span><span></span></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  thinking = div;
}

function hideThinking() {
  if (thinking) { thinking.remove(); thinking = null; }
}

// ── GITHUB ──
async function getFile(repo, filepath) {
  const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${repo}/contents/${filepath}`, {
    headers: { Authorization: `token ${GITHUB_TOKEN}`, Accept: 'application/vnd.github.v3+json' }
  });
  if (!res.ok) throw new Error(`Soubor nenalezen: ${filepath}`);
  const data = await res.json();
  return { content: atob(data.content.replace(/\n/g, '')), sha: data.sha };
}

async function updateFile(repo, filepath, newContent, sha, message) {
  const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${repo}/contents/${filepath}`, {
    method: 'PUT',
    headers: { Authorization: `token ${GITHUB_TOKEN}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: message || 'Aktualizace přes agenta', content: btoa(unescape(encodeURIComponent(newContent))), sha })
  });
  if (!res.ok) { const e = await res.json(); throw new Error(e.message); }
}

async function getCommits(repo, filepath) {
  const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${repo}/commits?path=${filepath}&per_page=5`, {
    headers: { Authorization: `token ${GITHUB_TOKEN}` }
  });
  if (!res.ok) throw new Error('Nelze načíst historii');
  return await res.json();
}

async function getFileAtCommit(repo, filepath, sha) {
  const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${repo}/contents/${filepath}?ref=${sha}`, {
    headers: { Authorization: `token ${GITHUB_TOKEN}` }
  });
  if (!res.ok) throw new Error(`Commit nenalezen: ${sha}`);
  const data = await res.json();
  return atob(data.content.replace(/\n/g, ''));
}

// ── GROQ ──
async function callGroq(systemPrompt, msgs) {
  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${GROQ_API_KEY}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'llama-3.3-70b-versatile', max_tokens: 4000, messages: [{ role: 'system', content: systemPrompt }, ...msgs] })
  });
  if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || 'Groq chyba'); }
  const data = await res.json();
  return data.choices[0].message.content;
}

function applyPatch(original, patch) {
  const m = patch.match(/NAJDI:\n([\s\S]*?)\nNAHRAD:\n([\s\S]*?)(\nKONEC|$)/);
  if (!m) return null;
  const find = m[1].trim();
  const replace = m[2].trim();
  if (!original.includes(find)) return null;
  return original.replace(find, replace);
}

// ── COMMANDS ──
async function handleCommand(text, p) {
  if (text === '/help') return '📋 Příkazy:\n/history — posledních 5 commitů\n/soubory — soubory v repozitáři\n/projekt — aktuální projekt\n/revert [hash] — vrátit verzi\n\nNebo napiš co chceš změnit!';
  if (text === '/projekt') return `📁 ${p.name} (${p.url})\n📄 ${p.file}`;
  if (text === '/history') {
    const commits = await getCommits(p.repo, p.file);
    return commits.map((c, i) => `${i+1}. ${c.sha.substring(0,7)} — ${c.commit.message}\n   ${new Date(c.commit.author.date).toLocaleString('cs-CZ')}`).join('\n\n') + '\n\nPro revert: /revert [hash]';
  }
  if (text === '/soubory') {
    const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${p.repo}/contents/`, { headers: { Authorization: `token ${GITHUB_TOKEN}` } });
    const files = await res.json();
    return '📂 Soubory:\n' + files.filter(f => f.type === 'file').map(f => `• ${f.name}`).join('\n');
  }
  if (text.startsWith('/revert ')) {
    const hash = text.replace('/revert ', '').trim();
    const oldContent = await getFileAtCommit(p.repo, p.file, hash);
    const current = await getFile(p.repo, p.file);
    await updateFile(p.repo, p.file, oldContent, current.sha, `Revert na ${hash}`);
    return `✅ Vráceno na verzi ${hash}`;
  }
  return null;
}

// ── SEND ──
async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  addMsg('user', text);
  showThinking();
  const p = projects[currentProject];
  try {
    const cmdResult = await handleCommand(text, p);
    hideThinking();
    if (cmdResult) { addMsg('bot', cmdResult); return; }

    const { content: fileContent, sha: fileSha } = await getFile(p.repo, p.file);
    const snippet = fileContent.substring(0, 8000);
    const snippetEnd = fileContent.length > 8000 ? fileContent.substring(fileContent.length - 2000) : '';

    const systemPrompt = `Jsi expert na HTML/CSS upravující web ${p.name}.
Vrať PŘESNĚ tento formát pro úpravy:

POPIS: [co jsi změnil]
NAJDI:
[přesný text z originálního souboru včetně odsazení]
NAHRAD:
[nový text]
KONEC

Měň POUZE to co uživatel žádá. Pro otázky odpověz normálně BEZ formátu NAJDI/NAHRAD.`;

    history.push({ role: 'user', content: text });
    if (history.length > 10) history = history.slice(-10);

    const contextMsg = `Začátek souboru:\n${snippet}\n${snippetEnd ? `\nKonec souboru:\n${snippetEnd}` : ''}`;
    const msgs = [{ role: 'user', content: contextMsg }, { role: 'assistant', content: 'Rozumím.' }, ...history];

    const response = await callGroq(systemPrompt, msgs);
    history.push({ role: 'assistant', content: response });

    if (response.includes('NAJDI:') && response.includes('NAHRAD:')) {
      const patched = applyPatch(fileContent, response);
      const popisMatch = response.match(/POPIS: (.+)/);
      const popis = popisMatch ? popisMatch[1] : 'Úprava webu';
      if (patched) {
        await updateFile(p.repo, p.file, patched, fileSha, popis);
        addMsg('bot', `✅ Hotovo!\n\n${popis}\n\n🚀 Na GitHubu, Railway nasazuje...`, 'success');
      } else {
        addMsg('bot', '⚠️ Nepodařilo se najít text k nahrazení.\n\nBuď konkrétnější — napiš přesně který text nebo sekci chceš změnit.', 'error');
      }
    } else {
      addMsg('bot', response);
    }
  } catch (err) {
    hideThinking();
    addMsg('bot', `❌ Chyba: ${err.message}`, 'error');
  }
}

function sendQuick(cmd) { document.getElementById('input').value = cmd; sendMessage(); }

document.getElementById('input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
document.getElementById('input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

init();
</script>
</body>
</html>
